name: Terraform CI

# Runs on every PR targeting main, and on direct pushes to main.
# Validates formatting, correctness, linting, and security of all Terraform code
# before it can be merged or applied.

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - "karpenter/**"
      - ".github/workflows/ci.yaml"
      - ".tflint.hcl"
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "karpenter/**"

# Cancel in-flight runs for the same PR/branch to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read  # allow upload-sarif to inspect the workflow run for telemetry
  pull-requests: write  # post lint/plan summaries as PR comments
  security-events: write  # upload SARIF findings to GitHub Security tab

env:
  TF_DIR: ${{ vars.TF_DIR }}
  TF_VERSION: ${{ vars.TF_VERSION }}

jobs:
  # ── 1. Format ────────────────────────────────────────────────────────────────
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt
        id: fmt
        run: terraform -chdir=${{ env.TF_DIR }} fmt -recursive -check -diff
        continue-on-error: true

      - name: Post fmt failure to PR
        if: github.event_name == 'pull_request' && steps.fmt.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## ❌ `terraform fmt` failed\n\nRun `make fmt` locally and commit the result.'
            });

      - name: Fail if fmt found issues
        if: steps.fmt.outcome == 'failure'
        run: exit 1

  # ── 2. Validate ──────────────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init (no backend)
        run: |
          terraform -chdir=${{ env.TF_DIR }} init \
            -backend=false \
            -reconfigure \
            -input=false

      - name: terraform validate
        run: terraform -chdir=${{ env.TF_DIR }} validate -no-color

  # ── 3. Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: Init TFLint (downloads AWS plugin)
        run: tflint --init
        working-directory: ${{ env.TF_DIR }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run TFLint
        run: tflint --recursive --format compact
        working-directory: ${{ env.TF_DIR }}

  # ── 4. Security scan ──────────────────────────────────────────────────────────
  security:
    name: Security scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TF_DIR }}
          framework: terraform
          soft_fail: false
          # Emit both human-readable console output and a SARIF file for the
          # GitHub Security tab so findings are tracked over time.
          output_format: cli,sarif
          output_file_path: console,results.sarif
          # Suppress low-signal checks that add noise without value in this context.
          # Review and remove suppressions as the project matures.
          skip_check: >-
            CKV_AWS_144,
            CKV2_AWS_62

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: checkov

  # ── 5. Summary gate ───────────────────────────────────────────────────────────
  # A single job that all checks roll up into. Configure branch protection to
  # require only this job — avoids updating rules when new checks are added.
  ci-pass:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [fmt, validate, lint, security]
    if: always()
    steps:
      - name: All checks passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more CI checks failed."
            exit 1
          fi
          echo "All CI checks passed."
